services:
  claude-code:
    build:
      context: .
    # VS Code がアタッチするためコンテナを生かし続ける
    command: sleep infinity
    # user: は指定しない。Dockerfile の USER node がデフォルトユーザーになる。
    # compose 側で user: を固定すると VS Code Server の初期セットアップで
    # 権限エラーが起きるため、ユーザー切替は devcontainer.json の remoteUser に一任。
    volumes:
      # ワークスペース bind mount
      - ../:/workspaces/cc-dev-container

      # /home/node 全体を named volume で永続化
      # 初回作成時、Dockerfile で構築済みのホームの中身が空の volume に自動コピーされる。
      # .claude / .claude.json / .cache/uv / .npm などすべてこの中に収まるので
      # 個別マウントは不要。コンテナ再作成しても設定・認証・キャッシュが残る。
      - node-home:/home/node

volumes:
  node-home: